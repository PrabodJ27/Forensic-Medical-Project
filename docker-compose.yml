services:
  backend:
    build: ./backend
    container_name: forensic-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: forensic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
